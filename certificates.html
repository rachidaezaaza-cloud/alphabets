<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الشواهد - عالم إسراء عالم المعرفة</title>

<style>
body{
    margin:0;
    font-family:Tahoma,Arial;
    background:#f4f7fb;
    color:#333;
}

header{
    background:linear-gradient(135deg,#0d6efd,#4dabf7);
    color:white;
    text-align:center;
    padding:40px 20px;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 3px 10px #ddd;
}

.card a{
    text-decoration:none;
    color:#0d6efd;
    font-weight:bold;
}

footer{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}
</style>

</head>

<body>

<header>
<h1>🎓 الشواهد التعليمية</h1>
<p>عالم إسراء عالم المعرفة</p>
</header>

<div class="container">

<h2 style="text-align:center">
احصل على شهادة تقدير
</h2>

<div class="cards">

<div class="card">
<h2>🏆 شهادة إتمام الدرس</h2>
<p>شهادة خاصة بالتلاميذ بعد إنهاء الدروس.</p>
<a href="#">تحميل قريباً</a>
</div>

<div class="card">
<h2>⭐ شهادة التفوق</h2>
<p>تكريم التلاميذ المتفوقين.</p>
<a href="#">تحميل قريباً</a>
</div>

<div class="card">
<h2>📚 شهادة المشاركة</h2>
<p>شهادة للمشاركة في أنشطة الموقع.</p>
<a href="#">تحميل قريباً</a>
</div>

</div>

</div>

<footer>
© 2026 عالم إسراء عالم المعرفة
</footer>

</body>
</html>
