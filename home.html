
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة التعليم الابتدائي المغربي</title>

<style>

body{
margin:0;
font-family:Tahoma,Arial;
background:#f4f7fb;
}

header{
background:#0d6efd;
color:white;
padding:25px;
text-align:center;
}

header h1{
margin:0;
font-size:34px;
}

header p{
font-size:20px;
}

.search{
text-align:center;
margin:25px;
}

.search input{
width:80%;
max-width:500px;
padding:15px;
border-radius:10px;
border:none;
font-size:18px;
}

.levels{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

padding:20px;

}

.card{

background:white;

border-radius:15px;

padding:25px;

text-align:center;

box-shadow:0 5px 15px rgba(0,0,0,.15);

transition:.3s;

}

.card:hover{

transform:scale(1.05);

}

.card a{

text-decoration:none;

font-size:22px;

font-weight:bold;

color:#0d6efd;

}

footer{

background:#0d6efd;

color:white;

text-align:center;

padding:20px;

margin-top:30px;

}

</style>

</head>

<body>

<header>

<h1>📚 منصة التعليم الابتدائي المغربي</h1>

<p>دروس • تمارين • فروض • امتحانات • فيديوهات • ذكاء اصطناعي</p>

</header>

<div class="search">

<input type="text" placeholder="🔍 ابحث عن درس أو مادة...">

</div>

<div class="levels">

<div class="card"><a href="#">🟢 الأول ابتدائي</a></div>

<div class="card"><a href="#">🔵 الثاني ابتدائي</a></div>

<div class="card"><a href="#">🟡 الثالث ابتدائي</a></div>

<div class="card"><a href="#">🟠 الرابع ابتدائي</a></div>

<div class="card"><a href="#">🔴 الخامس ابتدائي</a></div>

<div class="card"><a href="#">🟣 السادس ابتدائي</a></div>

</div>

<footer>

© 2026 منصة التعليم الابتدائي المغربي

</footer>

</body>
  </html>
